spring:
  application:
    name: sales-champion-ai

  datasource:
    url: jdbc:h2:mem:salesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      model-name: gpt-4
      temperature: 0.7
    embedding-model:
      api-key: ${OPENAI_API_KEY:your-api-key-here}

server:
  port: 8080

sales-ai:
  knowledge-base-path: ./knowledge-base
  recording-path: ./recordings